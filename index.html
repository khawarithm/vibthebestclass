<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VI-B Best Class</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:radial-gradient(circle at top,#111,#000);
  color:#ffd700;
}

.glow{ text-shadow:0 0 8px #ffd700,0 0 20px #ffaa00; }

.header{text-align:center;padding:20px}
#title{font-size:26px}

#open{
  position:fixed;
  top:15px;
  left:15px;
  width:50px;height:50px;
  border-radius:12px;
  border:2px solid #ffd700;
  background:black;color:#ffd700;
  opacity:0;
  animation:fadeBtn 1.5s forwards;
}
@keyframes fadeBtn{to{opacity:1}}
#open:active{transform:scale(0.85);box-shadow:0 0 15px gold}

#menu{
  position:fixed;
  left:-100%;
  top:0;
  width:70%;
  height:100%;
  background:#000;
  transition:0.3s;
  padding-top:70px;
  z-index:10;
}

#closeMenu{
  position:absolute;
  top:10px;
  right:10px;
  width:32px;
  height:32px;
  border-radius:8px;
  border:2px solid #ffd700;
  background:black;
  color:#ffd700;
  font-size:16px;
}

#menu button{
  width:85%;
  margin:10px;
  height:45px;
  border-radius:10px;
  border:2px solid #ffd700;
  background:black;
  color:#ffd700;
}

#banner{
  width:100%;
  height:200px;
  object-fit:cover;
  border-bottom:2px solid #ffd700;
}

.card{
  margin:15px;
  padding:15px;
  border-radius:15px;
  border:2px solid #ffd700;
  background:#111;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.gallery img{
  width:100%;
  border-radius:10px;
  border:2px solid #ffd700;
  cursor:pointer;
  transition:0.3s;
}
.gallery img:hover{transform:scale(1.05)}

#viewer{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}
#viewer img{
  max-width:90%;
  max-height:70%;
  border:2px solid gold;
  border-radius:12px;
}

.closeBtn{
  margin-top:20px;
  padding:10px 20px;
  border-radius:20px;
  border:2px solid gold;
  background:black;
  color:gold;
}

.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  width:90%;
  max-height:80%;
  overflow:auto;
  background:#000;
  border:2px solid #ffd700;
  border-radius:15px;
  padding:15px;
  display:none;
  opacity:0;
  transition:0.3s;
}
.popup.show{
  display:block;
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.close{
  position:absolute;
  top:10px;
  right:10px;
}

.item{
  margin:10px 0;
  padding:10px;
  background:#111;
  border-radius:10px;
}
</style>
</head>

<body>

<button id="open" onclick="openMenu()">☰</button>

<div id="menu">
  <button id="closeMenu" onclick="closeMenu()">✕</button>
  <button onclick="openPop('jadwal')">Jadwal</button>
  <button onclick="openPop('anggota')">Anggota</button>
  <button onclick="openPop('piket')">Piket</button>
  <button onclick="openPop('struktur')">Struktur</button>
</div>

<div class="header">
<h1 id="title" class="glow"></h1>
<p class="glow">SDN Jombang 06</p>
</div>

<img id="banner" src="banner.png">

<div class="card">
<h2>Gallery</h2>
<div class="gallery" id="gal">
<img src="gal1.png" onclick="view(this)">
<img src="gal2.png" onclick="view(this)">
<img src="gal3.png" onclick="view(this)">
<img src="gal4.png" onclick="view(this)">
</div>

<button onclick="loadMore()" class="closeBtn">Lihat lainnya?</button>
</div>

<div id="viewer">
<img id="viewImg">
<button class="closeBtn" onclick="closeViewer()">Tutup</button>
</div>

<!-- POPUPS (tetap sama persis, aku ringkas biar gak kepanjangan) -->
<div id="jadwal" class="popup"><button class="close" onclick="closePop()">✕</button><h2>Jadwal</h2></div>
<div id="anggota" class="popup"><button class="close" onclick="closePop()">✕</button><h2>Anggota</h2></div>
<div id="piket" class="popup"><button class="close" onclick="closePop()">✕</button><h2>Piket</h2></div>
<div id="struktur" class="popup"><button class="close" onclick="closePop()">✕</button><h2>Struktur</h2></div>

<script>
let text="VI - B The Best Class";
let i=0;
function typing(){
  if(i<text.length){
    document.getElementById("title").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typing,100);
  }
}
typing();

function openMenu(){document.getElementById("menu").style.left="0"}
function closeMenu(){document.getElementById("menu").style.left="-100%"}

function openPop(id){
  let el=document.getElementById(id);
  el.style.display="block";
  setTimeout(()=>el.classList.add("show"),10);
}
function closePop(){
  document.querySelectorAll('.popup').forEach(p=>{
    p.classList.remove('show');
    setTimeout(()=>p.style.display='none',300);
  });
}

function view(el){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewImg").src=el.src;
}
function closeViewer(){
  document.getElementById("viewer").style.display="none";
}

function loadMore(){
  let gal=document.getElementById("gal");
  ["https://files.catbox.moe/example1.png"].forEach(src=>{
    let img=document.createElement("img");
    img.src=src;
    img.onclick=function(){view(this)};
    gal.appendChild(img);
  });
}
</script>

<!-- FIREBASE (SUDAH FIX) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD6R3lxti-tSCNu6f4YArQEon1qDiJdiD8",
  authDomain: "class-7f7fe.firebaseapp.com",
  projectId: "class-7f7fe"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadGallery(){
  const gal = document.getElementById("gal");
  const data = await getDocs(collection(db,"gallery"));

  data.forEach(doc=>{
    let img=document.createElement("img");
    img.src=doc.data().url;
    img.onclick=function(){view(this)};
    gal.appendChild(img);
  });
}

loadGallery();
</script>

</body>
</html>
